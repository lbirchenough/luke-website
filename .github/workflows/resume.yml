name: Generate Resume PDF
on:
  push:
    paths: 
      - 'resume.md'
      - 'resume.css'
  workflow_dispatch: # Allow manual trigger

jobs:
  generate-resume:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm install
      
    - name: Setup Pandoc
      uses: pandoc/setup-pandoc@v1
      
    - name: Generate HTML
      run: pandoc resume.md -o resume.html --css=resume.css --standalone --embed-resources
      
    - name: Generate PDF with Puppeteer
      run: |
        node -e "
        const puppeteer = require('puppeteer');
        (async () => {
          const browser = await puppeteer.launch();
          const page = await browser.newPage();
          await page.goto('file://' + process.cwd() + '/resume.html');
          await page.pdf({
            path: 'resume.pdf', 
            format: 'A4', 
            printBackground: true, 
            margin: {top: '0', right: '0', bottom: '0', left: '0'}
          });
          await browser.close();
        })();
        "
        
    - name: Commit generated files
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add resume.html resume.pdf
        git diff --staged --quiet || git commit -m "Auto-generate resume files [skip ci]"
        git push
